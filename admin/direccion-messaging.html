<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Mensajería - Dirección</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- SystemDataManager -->
    <script src="../js/systemDataManager.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-primary {
            background: #3498db;
            color: white;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-psychology {
            background: #9b59b6;
            color: white;
        }

        .btn-psychology:hover {
            background: #8e44ad;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
        }

        .card-header h3 {
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #2c3e50;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .psychology-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .psychologist-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .psychologist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .psychologist-card.selected {
            border-color: #9b59b6;
            background: #f3e8f8;
        }

        .psychologist-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #9b59b6;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 2rem;
            font-weight: bold;
        }

        .psychologist-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .psychologist-status {
            font-size: 0.9rem;
            color: #666;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        .table th,
        .table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }

        .table tbody tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-sent {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-icon.primary {
            background: #e3f2fd;
            color: #2196f3;
        }

        .stat-icon.psychology {
            background: #f3e8f8;
            color: #9b59b6;
        }

        .stat-info h3 {
            font-size: 2rem;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .stat-info p {
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-user-tie"></i> Sistema de Mensajería - Dirección</h1>
            <div class="user-info">
                <span><i class="fas fa-user"></i> Director General</span>
                <button class="btn btn-secondary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i> Volver
                </button>
            </div>
        </div>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon primary">
                    <i class="fas fa-paper-plane"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalMessages">0</h3>
                    <p>Total Mensajes Enviados</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon psychology">
                    <i class="fas fa-brain"></i>
                </div>
                <div class="stat-info">
                    <h3 id="psychologyMessages">0</h3>
                    <p>Mensajes a Psicología</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon primary">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-info">
                    <h3 id="teacherMessages">0</h3>
                    <p>Mensajes a Profesores</p>
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon psychology">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="todayMessages">0</h3>
                    <p>Mensajes de Hoy</p>
                </div>
            </div>
        </div>

        <!-- Send Message Section -->
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-paper-plane"></i> Enviar Nuevo Mensaje</h3>
                <button class="btn btn-primary" onclick="loadMessageHistory()">
                    <i class="fas fa-history"></i> Ver Historial
                </button>
            </div>
            
            <form id="messageForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="recipientType">Tipo de Destinatario</label>
                        <select id="recipientType" class="form-control" onchange="updateRecipientOptions()">
                            <option value="">Seleccionar tipo...</option>
                            <option value="psychology">Psicología</option>
                            <option value="teacher">Profesor Específico</option>
                            <option value="all-teachers">Todos los Profesores</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="recipientSelect">Destinatario</label>
                        <select id="recipientSelect" class="form-control" disabled>
                            <option value="">Seleccione primero el tipo de destinatario</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="subject">Asunto</label>
                    <input type="text" id="subject" class="form-control" placeholder="Asunto del mensaje..." required>
                </div>
                
                <div class="form-group">
                    <label for="content">Contenido del Mensaje</label>
                    <textarea id="content" class="form-control" rows="6" placeholder="Escriba su mensaje aquí..." required></textarea>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-psychology">
                        <i class="fas fa-paper-plane"></i> Enviar Mensaje
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="clearForm()">
                        <i class="fas fa-eraser"></i> Limpiar
                    </button>
                </div>
            </form>
        </div>

        <!-- Psychology Selection Grid -->
        <div class="card" id="psychologySelection" style="display: none;">
            <div class="card-header">
                <h3><i class="fas fa-brain"></i> Seleccionar Psicóloga</h3>
            </div>
            
            <div class="psychology-grid" id="psychologyGrid">
                <!-- Las psicólogas se cargarán aquí -->
            </div>
        </div>

        <!-- Message History -->
        <div class="card" id="messageHistory" style="display: none;">
            <div class="card-header">
                <h3><i class="fas fa-history"></i> Historial de Mensajes Enviados</h3>
                <button class="btn btn-secondary" onclick="exportHistory()">
                    <i class="fas fa-download"></i> Exportar
                </button>
            </div>
            
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Destinatario</th>
                            <th>Asunto</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="messagesList">
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 40px; color: #7f8c8d;">
                                <i class="fas fa-history" style="font-size: 2rem; margin-bottom: 10px; display: block; color: #ddd;"></i>
                                No hay mensajes enviados
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        class DirectionMessaging {
            constructor() {
                this.systemDataManager = null;
                this.selectedPsychologist = null;
                this.init();
            }

            init() {
                this.loadSystemDataManager();
                this.setupEventListeners();
                this.loadPsychologists();
                this.updateStats();
            }

            loadSystemDataManager() {
                if (typeof window.systemDataManager !== 'undefined') {
                    this.systemDataManager = window.systemDataManager;
                } else {
                    console.error('SystemDataManager no disponible');
                }
            }

            setupEventListeners() {
                const form = document.getElementById('messageForm');
                if (form) {
                    form.addEventListener('submit', (e) => {
                        e.preventDefault();
                        this.sendMessage();
                    });
                }
            }

            loadPsychologists() {
                if (this.systemDataManager) {
                    const psychologists = this.systemDataManager.getUsers().filter(u => u.role === 'psicologa');
                    this.displayPsychologists(psychologists);
                }
            }

            displayPsychologists(psychologists) {
                const grid = document.getElementById('psychologyGrid');
                if (grid) {
                    grid.innerHTML = '';
                    psychologists.forEach(psychologist => {
                        const card = document.createElement('div');
                        card.className = 'psychologist-card';
                        card.innerHTML = `
                            <div class="psychologist-avatar">${psychologist.name.substring(0, 2).toUpperCase()}</div>
                            <div class="psychologist-name">${psychologist.name}</div>
                            <div class="psychologist-status">Disponible</div>
                        `;
                        card.addEventListener('click', () => {
                            this.selectPsychologist(psychologist, card);
                        });
                        grid.appendChild(card);
                    });
                }
            }

            selectPsychologist(psychologist, card) {
                // Remover selección anterior
                document.querySelectorAll('.psychologist-card').forEach(c => c.classList.remove('selected'));
                
                // Seleccionar nueva
                card.classList.add('selected');
                this.selectedPsychologist = psychologist;
                
                // Actualizar selector
                const recipientSelect = document.getElementById('recipientSelect');
                if (recipientSelect) {
                    recipientSelect.value = psychologist.username;
                }
            }

            sendMessage() {
                const recipientType = document.getElementById('recipientType').value;
                const subject = document.getElementById('subject').value;
                const content = document.getElementById('content').value;
                
                if (!recipientType || !subject || !content) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'Por favor complete todos los campos'
                    });
                    return;
                }

                let recipient = '';
                
                if (recipientType === 'psychology') {
                    recipient = this.selectedPsychologist ? this.selectedPsychologist.username : '';
                } else if (recipientType === 'teacher') {
                    recipient = document.getElementById('recipientSelect').value;
                } else if (recipientType === 'all-teachers') {
                    recipient = 'all-teachers';
                }

                if (!recipient) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Error',
                        text: 'Por favor seleccione un destinatario'
                    });
                    return;
                }

                const messageData = {
                    de: 'direccion',
                    para: recipient,
                    asunto: subject,
                    contenido: content,
                    remitenteNombre: 'Dirección General',
                    timestamp: new Date().toISOString()
                };

                // Enviar mensaje
                if (this.systemDataManager) {
                    this.systemDataManager.guardarMensaje(messageData);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Mensaje Enviado',
                        text: 'El mensaje ha sido enviado exitosamente'
                    });
                    
                    // Limpiar formulario
                    this.clearForm();
                    
                    // Actualizar estadísticas
                    this.updateStats();
                }
            }

            clearForm() {
                document.getElementById('messageForm').reset();
                document.querySelectorAll('.psychologist-card').forEach(c => c.classList.remove('selected'));
                this.selectedPsychologist = null;
            }

            updateStats() {
                if (this.systemDataManager) {
                    const messages = this.systemDataManager.obtenerMensajes('direccion', 'enviados');
                    const today = new Date().toDateString();
                    const todayMessages = messages.filter(m => new Date(m.timestamp).toDateString() === today);
                    
                    document.getElementById('totalMessages').textContent = messages.length;
                    document.getElementById('psychologyMessages').textContent = messages.filter(m => m.para.startsWith('psi_')).length;
                    document.getElementById('teacherMessages').textContent = messages.filter(m => m.para.startsWith('prof_')).length;
                    document.getElementById('todayMessages').textContent = todayMessages.length;
                }
            }

            loadMessageHistory() {
                const historyCard = document.getElementById('messageHistory');
                historyCard.style.display = 'block';
                
                if (this.systemDataManager) {
                    const messages = this.systemDataManager.obtenerMensajes('direccion', 'enviados');
                    this.displayMessageHistory(messages);
                }
            }

            displayMessageHistory(messages) {
                const messagesList = document.getElementById('messagesList');
                
                if (messages.length === 0) {
                    messagesList.innerHTML = `
                        <tr>
                            <td colspan="5" style="text-align: center; padding: 40px; color: #7f8c8d;">
                                <i class="fas fa-history" style="font-size: 2rem; margin-bottom: 10px; display: block; color: #ddd;"></i>
                                No hay mensajes enviados
                            </td>
                        </tr>
                    `;
                    return;
                }

                messagesList.innerHTML = '';
                messages.forEach(message => {
                    const row = document.createElement('tr');
                    const recipientName = this.getRecipientName(message.para);
                    const date = new Date(message.timestamp).toLocaleDateString();
                    
                    row.innerHTML = `
                        <td>${date}</td>
                        <td>${recipientName}</td>
                        <td>${message.asunto}</td>
                        <td><span class="status-badge status-sent">Enviado</span></td>
                        <td>
                            <button class="btn btn-primary btn-sm" onclick="directionMessaging.viewMessage('${message.id}')">
                                <i class="fas fa-eye"></i> Ver
                            </button>
                        </td>
                    `;
                    messagesList.appendChild(row);
                });
            }

            getRecipientName(username) {
                if (username === 'all-teachers') return 'Todos los Profesores';
                
                if (this.systemDataManager) {
                    const user = this.systemDataManager.getUser(username);
                    return user ? user.name : username;
                }
                
                return username;
            }

            viewMessage(messageId) {
                if (this.systemDataManager) {
                    const message = this.systemDataManager.obtenerDetallesMensaje(messageId);
                    
                    if (message) {
                        Swal.fire({
                            title: message.asunto,
                            html: `
                                <p><strong>Para:</strong> ${this.getRecipientName(message.para)}</p>
                                <p><strong>Fecha:</strong> ${new Date(message.timestamp).toLocaleString()}</p>
                                <hr>
                                <p>${message.contenido}</p>
                            `,
                            icon: 'info',
                            confirmButtonText: 'Cerrar'
                        });
                    }
                }
            }

            exportHistory() {
                if (this.systemDataManager) {
                    const messages = this.systemDataManager.obtenerMensajes('direccion', 'enviados');
                    
                    // Crear CSV
                    const csv = [
                        ['Fecha', 'Destinatario', 'Asunto', 'Contenido'],
                        ...messages.map(m => [
                            new Date(m.timestamp).toLocaleDateString(),
                            this.getRecipientName(m.para),
                            m.asunto,
                            m.contenido
                        ])
                    ].map(row => row.join(',')).join('\n');
                    
                    // Descargar archivo
                    const blob = new Blob([csv], { type: 'text/csv' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `mensajes_direccion_${new Date().toISOString().split('T')[0]}.csv`;
                    a.click();
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'Exportación Completa',
                        text: 'El historial ha sido exportado exitosamente'
                    });
                }
            }
        }

        // Funciones globales
        function updateRecipientOptions() {
            const recipientType = document.getElementById('recipientType').value;
            const recipientSelect = document.getElementById('recipientSelect');
            const psychologySelection = document.getElementById('psychologySelection');
            
            recipientSelect.innerHTML = '';
            recipientSelect.disabled = false;
            
            if (recipientType === 'psychology') {
                psychologySelection.style.display = 'block';
                recipientSelect.innerHTML = '<option value="">Seleccione una psicóloga en el grid</option>';
                recipientSelect.disabled = true;
            } else if (recipientType === 'teacher') {
                psychologySelection.style.display = 'none';
                recipientSelect.innerHTML = '<option value="">Seleccionar profesor...</option>';
                
                if (directionMessaging.systemDataManager) {
                    const teachers = directionMessaging.systemDataManager.getUsers().filter(u => u.role === 'docente');
                    teachers.forEach(teacher => {
                        const option = document.createElement('option');
                        option.value = teacher.username;
                        option.textContent = teacher.name;
                        recipientSelect.appendChild(option);
                    });
                }
            } else if (recipientType === 'all-teachers') {
                psychologySelection.style.display = 'none';
                recipientSelect.innerHTML = '<option value="all-teachers">Todos los Profesores</option>';
            } else {
                psychologySelection.style.display = 'none';
                recipientSelect.innerHTML = '<option value="">Seleccione primero el tipo de destinatario</option>';
                recipientSelect.disabled = true;
            }
        }

        function clearForm() {
            directionMessaging.clearForm();
        }

        function goBack() {
            window.location.href = 'dashboardDirector.html';
        }

        // Inicializar
        let directionMessaging;
        
        document.addEventListener('DOMContentLoaded', () => {
            directionMessaging = new DirectionMessaging();
            window.directionMessaging = directionMessaging;
        });
    </script>
</body>
</html>
